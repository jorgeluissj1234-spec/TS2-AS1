<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Sitio Web</title>

    <link rel="stylesheet" href="styles.css">

    <!-- Iconos -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">
            <h2>Mi Sitio Web hecho con "Tiempo"</h2>
        </div>

        <nav>

            <a href="#">Inicio</a>
            <a href="#galeria">Galería</a>
            <a href="#interaccion">Acerca de</a>
            <a href="#footer">Contacto</a>

        </nav>

    </header>

    <!-- HERO -->

    <section class="hero">

        <div class="hero-texto">

            <h1>Welcum a mi pagina web</h1>

            <p>
                Ejemplo sencillo con HTML, CSS, JavaScript y para nada hecho con IA
            </p>

            <button id="botonVerMas">Ver más</button>

        </div>

        <div class="hero-imagen">

            <img src="SugerenciasDelCharly/SugerenciaDelCharly.jpg"
                alt="Paisaje">

        </div>

    </section>

    <!-- GALERÍA -->

    <section id="galeria">

        <h2>Galería</h2>

        <div class="contenedor-carrusel">

            <button id="anterior">
                <i class="fa-solid fa-chevron-left"></i>
            </button>

            <div class="carrusel">

                <img src="SugerenciasDelCharly/Goku.jpg">

                <img src="SugerenciasDelCharly/Amogus.png">

                <img src="SugerenciasDelCharly/mad mew mew.jpg">

                <img src="SugerenciasDelCharly/Mob.jpg">

                <img src="SugerenciasDelCharly/Zoro.jpg">

            </div>

            <button id="siguiente">
                <i class="fa-solid fa-chevron-right"></i>
            </button>

        </div>

    </section>

    <!-- INTERACCIÓN -->

    <section id="interaccion">

        <h2>Interacción</h2>

        <div class="mensaje" id="mensaje">

            Haz clic para cambiar este mensaje.

        </div>

        <button id="botonMensaje">

            Cambiar mensaje

        </button>

    </section>

    <!-- FOOTER -->

    <footer id="footer">

        <p>2026 - Programación Web</p>

        <div>

            <a href="#" id="linkInicio">Inicio</a>
            <a href="#galeria" id="linkGaleria">Galería</a>
            <a href="#" id="linkAcerca">Acerca de</a>
            <a href="#" id="linkContacto">Contacto</a>

        </div>

        <p><span id="emailText">info@misitioweb.com</span></p>

        <a href="https://www.youtube.com/watch?v=K2b7Tsekd9c&list=RDK2b7Tsekd9c&start_radio=1" id="botonFooter" class="boton-oculto" aria-label="Botón oculto">
            <img src="SugerenciasDelCharly/SANS.png" alt="Botón normal" class="normal">
            <img src="SugerenciasDelCharly/SANES.jpg" alt="Botón hover" class="hover">
        </a>

    </footer>

    <script src="script.js"></script>

</body>

</html>
